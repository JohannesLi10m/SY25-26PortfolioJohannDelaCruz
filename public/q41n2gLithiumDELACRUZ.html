<!DOCTYPE html>
<html>
<head>
  <title>Favorite Movies</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      margin: auto;
      background: #fff;
      padding: 20px 30px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      color: #333;
    }

    label {
      display: block;
      margin: 10px 0 5px;
      font-weight: bold;
      color: #444;
    }

    input[type="text"],
    input[type="number"],
    select {
      width: 100%;
      padding: 8px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 14px;
    }

    .stars {
      display: flex;
      gap: 5px;
      margin-bottom: 15px;
    }

    .star {
      font-size: 28px;
      color: lightgray;
      cursor: pointer;
      transition: color 0.2s;
    }

    .star:hover,
    .star.selected {
      color: gold;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #007bff;
      border: none;
      border-radius: 5px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #0056b3;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background: #f9f9f9;
      margin: 8px 0;
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #ddd;
    }

    .rating-display {
      color: gold;
      font-size: 20px;
      margin-left: 5px;
    }

    .delete-btn {
      width: auto;
      padding: 4px 10px;
      background: #dc3545;
      border: none;
      border-radius: 4px;
      color: white;
      font-size: 13px;
      cursor: pointer;
      margin-left: 8px;
      transition: background 0.3s;
    }

    .delete-btn:hover {
      background: #a71d2a;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Add / Update a Movie Rating</h2>
    
    <label for="title">Title:</label>
    <input type="text" id="title">
    
    <label for="year">Year:</label>
    <input type="number" id="year">
    
    <label for="genre">Genre:</label>
    <select id="genre">
      <option value="Action">Action</option>
      <option value="Comedy">Comedy</option>
      <option value="Drama">Drama</option>
      <option value="Sci-Fi">Sci-Fi</option>
    </select>
    
    <label>Rating:</label>
    <div class="stars" id="ratingStars">
      <span class="star" data-value="1">&#9733;</span>
      <span class="star" data-value="2">&#9733;</span>
      <span class="star" data-value="3">&#9733;</span>
      <span class="star" data-value="4">&#9733;</span>
      <span class="star" data-value="5">&#9733;</span>
    </div>
    
    <button onclick="addMovie()">Add Movie</button>
    
    <h2>Movie List</h2>
    <ul id="movieList"></ul>
  </div>
  
  <script>
    let selectedRating = 0;

    // Handle star clicks
    document.querySelectorAll(".star").forEach(star => {
      star.addEventListener("click", function() {
        selectedRating = this.getAttribute("data-value");
        updateStars(selectedRating);
      });
    });

    function updateStars(rating) {
      document.querySelectorAll(".star").forEach(star => {
        star.classList.remove("selected");
        if (star.getAttribute("data-value") <= rating) {
          star.classList.add("selected");
        }
      });
    }
     
    function listmovie(){
        const movielsts = {
            title: document.getElementById('title').value,
            year: document.getElementById('year').value,
            genre: document.getElementById('genre').value,
            rating: document.getElementById('ratingStars').value
        };
            localStorage.setItem('movielsts', JSON.stringify(movielsts));
    }

    function addMovie() {
      const title = document.getElementById('title').value;
      const year = document.getElementById('year').value;
      const genre = document.getElementById('genre').value;
      const rating = selectedRating;

      if (!title || !year || rating == 0) {
        alert("Please fill in all fields and select a rating.");
        return;
      }

      const existing = localStorage.getItem('movies');
      const movies = existing ? JSON.parse(existing) : [];

      const existingIndex = movies.findIndex(m => m.title.toLowerCase() === title.toLowerCase());

      if (existingIndex !== -1) {
        const oldRating = parseFloat(movies[existingIndex].rating);
        const newRating = parseFloat(rating);
        const avgRating = Math.round((oldRating + newRating) / 2);

        movies[existingIndex].year = year;
        movies[existingIndex].genre = genre;
        movies[existingIndex].rating = String(avgRating);
      } else {
        const newMovie = { title, year, genre, rating: String(rating) };
        movies.push(newMovie);
      }

      localStorage.setItem('movies', JSON.stringify(movies));

      document.getElementById('title').value = '';
      document.getElementById('year').value = '';
      document.getElementById('genre').value = 'Action';
      selectedRating = 0;
      updateStars(0);

      displayMovies();
    }

    function deleteMovie(index) {
      const confirmed = confirm("Are you sure you want to delete?");
      if (!confirmed) return;

      const existing = localStorage.getItem('movies');
      const movies = existing ? JSON.parse(existing) : [];

      movies.splice(index, 1);
      localStorage.setItem('movies', JSON.stringify(movies));

      displayMovies();
    }

    function displayMovies() {
      const movieList = document.getElementById('movieList');
      movieList.innerHTML = '';

      const existing = localStorage.getItem('movies');
      const movies = existing ? JSON.parse(existing) : [];

      movies.forEach((movie, index) => {
        const li = document.createElement('li');
        const stars = '★'.repeat(movie.rating) + '☆'.repeat(5 - movie.rating);
        li.innerHTML = `
          <strong>${movie.title}</strong> (${movie.year}) — ${movie.genre}, Rating:
          <span class="rating-display">${stars}</span>
          <button class="delete-btn" onclick="deleteMovie(${index})">Delete</button>
        `;
        movieList.appendChild(li);
      });
    }

window.onload = displayMovies;
  </script>
</body>
</html>

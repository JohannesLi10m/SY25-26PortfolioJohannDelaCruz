    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <meta name="keywords" content="2Q, Portfolio, Projects, and Web Development">

        <link rel="stylesheet" href="styles.css">
        <link rel="icon" href="./asset/LEBONBON.png" sizes="32x32" type="image/png">
        <script src="script.js" defer></script>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                background-color: #0d0d0d;
                color: #e0e0e0;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                min-height: 100vh;
            }

            h1 {
                text-align: center;
                padding: 30px 20px 10px;
                font-size: 2rem;
                color: #ffffff;
                letter-spacing: 2px;
                text-transform: uppercase;
                border-bottom: 1px solid #2a2a2a;
            }

            header {
                display: flex;
                justify-content: center;
                padding: 30px 20px;
            }

            header div {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 16px;
            }

            header img {
                width: 110px;
                height: 110px;
                border-radius: 50%;
                border: 3px solid #444;
                object-fit: cover;
            }

            header h2 {
                font-size: 1.2rem;
                color: #aaaaaa;
                font-weight: 400;
                letter-spacing: 1px;
            }

            nav {
                display: flex;
                justify-content: center;
                padding: 20px;
            }

            nav ul {
                list-style: none;
                display: flex;
                flex-wrap: wrap;
                gap: 14px;
                justify-content: center;
            }

            nav ul li a {
                display: block;
                padding: 12px 24px;
                background-color: #1a1a1a;
                color: #e0e0e0;
                text-decoration: none;
                border-radius: 8px;
                border: 1px solid #2e2e2e;
                font-size: 14px;
                letter-spacing: 0.5px;
                transition: background 0.2s, border-color 0.2s, color 0.2s;
            }

            nav ul li a:hover {
                background-color: #2a2a2a;
                border-color: #555;
                color: #ffffff;
            }
        </style>
    </head>
    <h1>Johann's SY25-26 Portfolio</h1>
